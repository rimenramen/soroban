<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soroban</title>
    <!-- Import Open Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Apply Open Sans globally */
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f4f6; /* Tailwind gray-100 */
        }
        
        /* Custom scrollbar for aesthetics */
        input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800 flex flex-col items-center">

    <!-- Header & Controls -->
    <div class="w-full max-w-7xl bg-white rounded-xl shadow-md p-6 mb-8">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">soroban not a generator</h1>
        
        <div class="flex flex-wrap justify-center items-end gap-4 md:gap-6">
            <div class="flex flex-col gap-1">
                <label for="numBlocks" class="text-sm font-semibold text-gray-600">Blocks</label>
                <input type="number" id="numBlocks" value="13" min="1" class="w-20 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center">
            </div>

            <div class="flex flex-col gap-1">
                <label for="numsPerBlock" class="text-sm font-semibold text-gray-600">Numbers / Block</label>
                <input type="number" id="numsPerBlock" value="13" min="1" class="w-28 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center">
            </div>

            <div class="flex flex-col gap-1">
                <label for="minDigits" class="text-sm font-semibold text-gray-600">Min Digits</label>
                <input type="number" id="minDigits" value="4" min="1" class="w-20 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center">
            </div>
            
            <div class="flex flex-col gap-1">
                <label for="maxDigits" class="text-sm font-semibold text-gray-600">Max Digits</label>
                <input type="number" id="maxDigits" value="4" min="1" class="w-20 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center">
            </div>
            
            <button onclick="generateBlocks()" class="w-full md:w-auto px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition duration-200 h-[42px]">
                Generate Numbers
            </button>
        </div>

        <!-- Error Message Box -->
        <div id="error-message" class="hidden mt-4 p-3 bg-red-100 text-red-700 border border-red-300 rounded-lg text-center font-semibold">
            Invalid input: Make sure Minimum digits is at least 1, and Maximum digits is greater than or equal to Minimum digits.
        </div>
    </div>

    <!-- Container for the 10 Blocks -->
    <!-- Uses a responsive grid: 1 col on mobile, 2 on tablets, 5 on large screens -->
    <div id="blocks-container" class="w-full max-w-7xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
        <!-- Blocks will be injected here by JavaScript -->
    </div>

    <script>
        /**
         * Generates a raw numeric string with a 13% chance of being negative.
         */
        function generateRandomNumberString(minDigits, maxDigits, canBeNegative = true) {
            const length = Math.floor(Math.random() * (maxDigits - minDigits + 1)) + minDigits;
            let numStr = '';
            
            for (let i = 0; i < length; i++) {
                if (i === 0) {
                    numStr += length === 1 ? Math.floor(Math.random() * 10) : Math.floor(Math.random() * 9) + 1;
                } else {
                    numStr += Math.floor(Math.random() * 10);
                }
            }
            
            // 13% chance to be negative (if allowed). We skip '-0' to keep outputs clean.
            if (canBeNegative && Math.random() < 0 && numStr !== '0') {
                numStr = '-' + numStr;
            }
            
            return numStr;
        }

        /**
         * Formats a raw number string with commas every 3 digits, handling negatives.
         */
        function formatNumberString(numStr) {
            const isNegative = numStr.startsWith('-');
            const absStr = isNegative ? numStr.substring(1) : numStr;
            const formatted = absStr.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            return isNegative ? '-' + formatted : formatted;
        }

        /**
         * Main function to read inputs, validate, and render the blocks
         */
        function generateBlocks() {
            const minDigitsInput = document.getElementById('minDigits').value;
            const maxDigitsInput = document.getElementById('maxDigits').value;
            const numBlocksInput = document.getElementById('numBlocks').value;
            const numsPerBlockInput = document.getElementById('numsPerBlock').value;
            
            const errorBox = document.getElementById('error-message');
            const container = document.getElementById('blocks-container');
            
            const minDigits = parseInt(minDigitsInput, 10);
            const maxDigits = parseInt(maxDigitsInput, 10);
            const numBlocks = parseInt(numBlocksInput, 10);
            const numsPerBlock = parseInt(numsPerBlockInput, 10);

            // Validation
            if (isNaN(minDigits) || isNaN(maxDigits) || isNaN(numBlocks) || isNaN(numsPerBlock) || 
                minDigits < 1 || maxDigits < 1 || minDigits > maxDigits || numBlocks < 1 || numsPerBlock < 1) {
                errorBox.classList.remove('hidden');
                errorBox.textContent = "Invalid input: Please verify all settings are valid numbers (Max >= Min, Blocks >= 1).";
                container.innerHTML = ''; 
                return;
            } else {
                errorBox.classList.add('hidden');
            }

            // Clear previous blocks
            container.innerHTML = '';

            // Create blocks
            for (let blockIndex = 0; blockIndex < numBlocks; blockIndex++) {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'bg-white rounded-xl shadow-md border border-gray-100 flex flex-col overflow-hidden transition hover:shadow-lg';
                
                // Use BigInt to accurately sum highly scaled, randomly generated string numbers
                let blockSum = 0n; 
                
                // Create numbers per block
                for (let numIndex = 0; numIndex < numsPerBlock; numIndex++) {
                    const numberDiv = document.createElement('div');
                    numberDiv.className = 'px-4 py-3 text-center text-lg font-semibold tracking-wide border-b border-gray-100';
                    
                    const rawNumStr = generateRandomNumberString(minDigits, maxDigits, numIndex !== 0);
                    
                    // Accumulate sum
                    blockSum += BigInt(rawNumStr);
                    
                    // Format and display
                    numberDiv.textContent = formatNumberString(rawNumStr);
                    
                    // Style negative numbers in red for clarity
                    if (rawNumStr.startsWith('-')) {
                        numberDiv.classList.add('text-red-600');
                    } else {
                        numberDiv.classList.add('text-gray-700');
                    }

                    blockDiv.appendChild(numberDiv);
                }
                
                // Create Sum row at the bottom
                const sumDiv = document.createElement('div');
                sumDiv.className = 'px-4 py-4 text-center text-lg font-bold tracking-wide border-t-2 border-gray-200 mt-auto cursor-pointer bg-white text-white';
                
                // Store the sum value and styling info
                const sumValue = 'Total: ' + formatNumberString(blockSum.toString());
                const isNegative = blockSum < 0n;
                
                // Initially hidden (white text on white background)
                sumDiv.textContent = sumValue;
                
                // Add click handler to toggle visibility
                sumDiv.addEventListener('click', function(e) {
                    if (this.classList.contains('text-white')) {
                        // Show the sum
                        this.classList.remove('text-white', 'bg-white');
                        if (isNegative) {
                            this.classList.add('bg-red-50', 'text-red-700');
                        } else {
                            this.classList.add('bg-gray-50', 'text-gray-900');
                        }
                    } else {
                        // Hide the sum
                        this.classList.remove('bg-red-50', 'bg-gray-50', 'text-red-700', 'text-gray-900');
                        this.classList.add('bg-white', 'text-white');
                    }
                });
                
                blockDiv.appendChild(sumDiv);
                
                // Add the completed block to the grid
                container.appendChild(blockDiv);
            }
        }

        // Generate initial set of numbers when the page loads
        window.onload = generateBlocks;
    </script>
</body>
</html>
